<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skin Analysis - Question 3: Oily/Shiny</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='question3_shiny.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="quiz-page">
  
  <nav class="glass-nav">
    <span class="nav-logo">Skin<span>OS</span></span>
            <div class="stepper-wrapper">
                <div class="step-bubble">Question 1</div>
                <div class="step-line"></div>
                <div class="step-bubble">Question 2</div>
                <div class="step-line"></div>
                <div class="step-bubble active">Question 3</div>
                <div class="step-line"></div>
                <div class="step-bubble">Question 4</div>
                <div class="step-line"></div>
                <div class="step-bubble">Question 5</div>
            </div>
    </nav>
    
    <div class="quiz-container">
        <div class="question-section">
            <h2 class="quiz-question">Which specific parts of your face tend to be oily or shiny?</h2>

            <form id="shinyForm">
                <div class="options-container">
                    <div class="cards-grid-container">
                
                <button type="button" data-value="all_area" onclick="saveShiny('all_area')" class="cute-square-card">
                    <h3 class="card-title">All Areas</h3>
                    <p class="card-detail">Entire face, including cheeks, forehead, nose, and chin, gets oily</p>
                </button>

                <button type="button" data-value="shiny_tzone" onclick="saveShiny('shiny_tzone')" class="cute-square-card">
                    <h3 class="card-title">T-Zone area</h3>
                    <p class="card-detail">Only forehead, nose, and chin get oily, while cheeks remain normal or dry</p>
                </button>

            </div>
        </form>
    </div>

    <div class="navigation-buttons">
        <a href="/question2" class="btn btn-secondary">Back</a>
    </div>
</div>

<script>
function saveShiny(shinyValue) {
    sessionStorage.setItem("userShinyArea", shinyValue);

    document.querySelectorAll('.cute-square-card').forEach(card => {
        card.classList.remove('selected');
    });

    const clickedElement = document.querySelector(`.cute-square-card[data-value="${shinyValue}"]`);
    if (clickedElement) {
        clickedElement.classList.add('selected');
    }
    
    setTimeout(function() {
        window.location.href = "/question4";
    }, 150); 
}

window.addEventListener("pageshow", function(event) {
    const savedShiny = sessionStorage.getItem("userShinyArea");

    if (savedShiny) {
        document.querySelectorAll('.cute-square-card').forEach(card => {
            card.classList.remove('selected');
        });

        const matchedButton = document.querySelector(`.cute-square-card[data-value="${savedShiny}"]`);
        if (matchedButton) {
            matchedButton.classList.add('selected');
        }
    }
});
</script>

</body>
</html>
